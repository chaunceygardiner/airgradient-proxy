# AirGradientProxy configuration file
# This configuration is good for testing.
# It writes to a database in /tmp
# and has prints debug info to stdout.

debug                 = 1
log-to-stdout         = 1
service-name          = airgradient-proxy
hostname              = airgradient
port                  = 80
timeout-secs          = 28
long-read-secs        = 10
server-port           = 8001
poll-freq-secs        = 30
poll-freq-offset      = 0
archive-interval-secs = 300
# Run a full cyclic garbage collection pass this often (seconds) and
# log the number of objects collected.  Runs only on poll (non-archive)
# events so the pause lands on idle time.  0 disables.
gc-interval-secs      = 3600
database-file         = /tmp/airgradientproxy.sdb
